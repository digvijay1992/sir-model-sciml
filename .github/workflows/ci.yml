name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['1.10.10', '1.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
      
      - name: Install dependencies
        run: |
          julia -e 'using Pkg; Pkg.add(["DifferentialEquations", "ModelingToolkit", "Plots"])'
      
      - name: Run SIR simulation
        run: julia A2P2.jl
      
      - name: Verify output
        run: |
          if [ -f "SIR_model.png" ]; then
            echo "✅ Simulation successful!"
          else
            echo "❌ Failed to generate plot"
            exit 1
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: sir-results
          path: SIR_model.png
